# 站点基本信息
title: "九头鸟龙"          # 站点标题，影响所有页面的<title>标签和页眉显示
name: "pengjunlong"              # 站点所有者名称，影响作者信息区域
description: "落霞与孤鹜齐飞，秋水共长天一色"    # 站点描述，影响<meta description>和SEO
url: "https://pengjunlong.github.io" # 站点URL，影响所有绝对链接
baseurl: ""          # 站点子路径，影响资源路径

# 构建设置
plugins:                # 插件列表
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache
exclude:                # 排除文件/目录
  - "node_modules"
  - "Gemfile.lock"
include:                # 包含特殊文件
  - ".htaccess"
keep_files:             # 保留文件
  - ".gitignore"
include_cache:
  enabled: true # 全局开关
  path: "_cache" # 缓存目录
  expires: 3600 # 缓存有效期(秒)


# 主题配置
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "air" # 明亮欢快皮肤: air(蓝色清新), sunrise(暖橙), aqua(青色), neon(霓虹)

# 自定义样式覆盖
sass:
  sass_dir: _sass
  style: compressed

# 头部自定义脚本/样式（通过 head_scripts 注入）
head_scripts:
  - /assets/css/custom.css

# 默认布局
defaults:
  - scope:
      path: "" # 所有页面
    values:
      layout: "single"
      author_profile: true

# 顶部导航菜单（引用 _data/navigation.yml 中的 main 键）
# navigation 配置已移至 _data/navigation.yml

# 作者信息
author:
  name: "Junlong Peng"
  avatar: "https://avatars.githubusercontent.com/u/1436509?v=4" # 作者头像
  bio: "数风流人物千里共婵娟"                     # 作者简介
  location: "北京"                      # 位置
  email: ""         # 邮箱
  links:                                # 社交链接
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/pengjunlong"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://pengjunlong.github.io"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pengjunlong"

# 分页配置
paginate: 5             # 每页显示文章数
paginate_path: "/blog/page:num" # 分页路径格式

# 搜索功能
search: true            # 启用搜索
search_provider: "lunr" # 搜索提供者(lunr, algolia)
search_full_content: true

# SEO优化
seo:
  title: true           # 自动生成SEO标题
  title_separator: "-"  # 标题分隔符
  description: true     # 使用页面描述
  author: true          # 包含作者信息

# 分析统计
analytics:
  provider: "google"
  google:
    tracking_id: "G-CZK4CWTZ59"

# 社交分享
share: true             # 启用分享按钮
share_provider: "addtoany" # 分享服务

# 子站点扩展规范
# 每个子仓库根目录放置 subsite-config.json，格式如下：
# {
#   "displayName": "站点名称",
#   "description": "站点简介",
#   "icon": "fas fa-rocket",     (Font Awesome 图标类名)
#   "tags": ["分类1", "分类2"],
#   "color": "#FF6B6B"            (可选：卡片主题色)
# }
