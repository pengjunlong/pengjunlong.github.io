<!-- ===== 子站点导航区域 ===== -->
<style>
/* ── 卡片网格 ─────────────────────────────────────────────── */
.subsites-section { margin: 2.5rem 0; }

.subsites-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.2rem;
}

/* ── 子站点卡片 ───────────────────────────────────────────── */
.subsite-card {
  position: relative;
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.2rem 1.1rem 1.2rem 1.3rem;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  text-decoration: none !important;
  color: inherit;
  overflow: hidden;
  transition: transform 0.28s ease, box-shadow 0.28s ease;
  border: 1.5px solid #eee;
}

@media (hover: hover) {
  .subsite-card:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 12px 36px rgba(0,0,0,0.15);
    border-color: #ccc;
  }
  .subsite-card:hover .subsite-card__icon {
    transform: rotate(-8deg) scale(1.12);
  }
  .subsite-card:hover .subsite-card__arrow {
    background: var(--accent, #333);
    color: #fff;
    transform: translateX(3px);
  }
}

/* 顶部彩条 */
.subsite-card__stripe {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--accent, #555);
  border-radius: 16px 16px 0 0;
}

/* 图标区 */
.subsite-card__icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
  transition: transform 0.28s ease;
}


.subsite-emoji-icon { line-height: 1; }

/* 内容区 */
.subsite-card__body { flex: 1; min-width: 0; }

.subsite-card__title {
  font-size: 1rem;
  font-weight: 700;
  margin: 0 0 0.3rem;
  color: #1a1a2e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-bottom: none !important;
}

.subsite-card__desc {
  font-size: 0.82rem;
  color: #6c757d;
  margin: 0 0 0.5rem;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.subsite-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 4px;
}

.subsite-card__tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.subsite-tag {
  display: inline-block;
  padding: 1px 8px;
  background: #f0f0f0;
  border-radius: 50px;
  font-size: 0.72rem;
  font-weight: 600;
  color: #555;
  border: 1px solid #ddd;
}

.subsite-card__meta {
  font-size: 0.72rem;
  color: #aaa;
  display: flex;
  align-items: center;
  gap: 3px;
}

/* 箭头 */
.subsite-card__arrow {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #555;
  font-size: 0.75rem;
  transition: background 0.18s ease, transform 0.18s ease;
}


/* ── 入场动画 ─────────────────────────────────────────────── */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.subsite-card--animate { animation: cardIn 0.45s ease both; }

/* ── 加载状态 ─────────────────────────────────────────────── */
.subsites-loading {
  text-align: center;
  padding: 2.5rem;
  color: #555;
}

.subsites-loading p { margin-top: 0.8rem; font-size: 0.9rem; color: #888; }

.subsites-loading-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.subsites-loading-dots span {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #555;
  animation: dotBounce 1.2s ease-in-out infinite;
}

.subsites-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.subsites-loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
  40%           { transform: scale(1.1); opacity: 1; }
}

/* ── 错误状态 ─────────────────────────────────────────────── */
.subsites-error {
  text-align: center;
  padding: 2rem 1rem;
  background: #fff5f5;
  border-radius: 12px;
  border: 1.5px solid #ffcccc;
}

.subsites-error i { font-size: 2rem; color: #e00; display: block; margin-bottom: 0.6rem; }
.subsites-error p { color: #e05; margin: 0 0 1rem; }

/* ── 响应式 ───────────────────────────────────────────────── */
@media (max-width: 768px) {
  .subsites-grid { grid-template-columns: 1fr; }
  .subsite-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .subsite-card__arrow { align-self: flex-end; }
}

/* 触摸设备：增加卡片点击区域 */
@media (pointer: coarse) {
  .subsite-card { padding: 1.4rem 1.3rem; }
}
</style>

<section id="subsites" class="subsites-section">
  <!-- 子站点卡片网格 -->
  <div class="subsites-grid" id="subsites-container">
    <!-- 静态备用内容：Jekyll 模板渲染（JS 加载失败时可见） -->
    {% for item in site.subsites %}
    <a href="{{ item.url | relative_url }}" class="subsite-card" data-tags="{{ item.tags | join: ',' }}" data-name="{{ item.displayName }}">
      <div class="subsite-card__icon">{{ item.icon }}</div>
      <div class="subsite-card__body">
        <h3 class="subsite-card__title">{{ item.displayName }}</h3>
        <p class="subsite-card__desc">{{ item.description }}</p>
        <div class="subsite-card__tags">
          {% for tag in item.tags %}
          <span class="subsite-tag">{{ tag }}</span>
          {% endfor %}
        </div>
      </div>
      <div class="subsite-card__arrow"><i class="fas fa-arrow-right"></i></div>
    </a>
    {% endfor %}
  </div>

  <!-- 加载状态 -->
  <div id="subsites-loading" class="subsites-loading">
    <div class="subsites-loading-dots">
      <span></span><span></span><span></span>
    </div>
    <p>正在发现子站点...</p>
  </div>

  <!-- 错误提示 -->
  <div id="subsites-error" class="subsites-error" style="display:none">
    <i class="fas fa-exclamation-circle"></i>
    <p id="subsites-error-msg">加载失败</p>
    <button id="subsites-retry" class="btn btn--warning btn--small">
      <i class="fas fa-redo"></i> 重试
    </button>
  </div>
</section>

<script src="{{ '/assets/js/subsites-loader.js' | relative_url }}"></script>
